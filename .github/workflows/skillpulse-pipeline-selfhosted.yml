name: Deploy to Self Hosted Runner

on: 
  push:
    branches: [main]
 
jobs:
  CI:
    name: Build and Push to DockerHub
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  CD:
    name: Deploy to Self Hosted Runner
    needs: [CI]
    uses: ./.github/workflows/cd-self-hosted.yml
    secrets: inherit
