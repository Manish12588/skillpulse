name: CD - Deploy on EC2 Server
on:
  workflow_call:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      GITHUB_REPO_OWNER: ${{ github.repository_owner }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
      DB_HOST: ${{ secrets.DB_HOST }}
      DB_USER: ${{ vars.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DB_NAME: ${{ vars.DB_NAME }}
    steps:
      - name: Install Docker on EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "Installing required packages & folders"
            sudo apt-get update && sudo apt-get install docker.io docker-compose-v2 -y
            sudo usermod -aG docker $USER
            sudo systemctl enable docker
            sudo systemctl start docker
            
      - name: Login to DockerHub
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: DOCKERHUB_USERNAME,DOCKERHUB_TOKEN
          script: |
            echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin

      - name: Create .env if not exists
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: MYSQL_ROOT_PASSWORD,DB_HOST,DB_USER,DB_PASSWORD,DB_NAME,DOCKERHUB_USERNAME
          script: |
            mkdir -p ~/skillpulse
            if [ ! -f ~/skillpulse/.env ]; then
              cat > ~/skillpulse/.env << EOF
            MYSQL_ROOT_PASSWORD=$MYSQL_ROOT_PASSWORD
            DB_HOST=$DB_HOST
            DB_USER=$DB_USER
            DB_PASSWORD=$DB_PASSWORD
            DB_NAME=$DB_NAME
            DOCKERHUB_USERNAME=$DOCKERHUB_USERNAME
            EOF
              echo ".env created from secrets"
            fi
            
      - name: Copy docker-compose.yml and sql file to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: GITHUB_REPO_OWNER
          script: |
            sudo rm -rf ~/skillpulse/mysql
            mkdir -p ~/skillpulse/mysql
            # Download docker-compose.yml
            curl -fsSL https://raw.githubusercontent.com/$GITHUB_REPO_OWNER/skillpulse/main/docker-compose.yml \
              -o ~/skillpulse/docker-compose.yml
            # Download init.sql
            curl -fsSL https://raw.githubusercontent.com/$GITHUB_REPO_OWNER/skillpulse/main/mysql/init.sql \
              -o ~/skillpulse/mysql/init.sql
             
      - name: Deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
             cd ~/skillpulse
             sudo docker compose pull
             sudo docker compose up -d --no-build
             sudo docker image prune -f

