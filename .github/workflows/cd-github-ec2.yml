name: CD - EC2 Server

on:
  #workflow_dispatch:
  workflow_call:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
      GITHUB_REPOSITORY: ${{ github.repository }}
      MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
      DB_HOST: ${{ secrets.DB_HOST }}
      DB_USER: ${{ vars.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DB_NAME: ${{ vars.DB_NAME }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
    steps:
      - name: Clone or pull repo
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: PAT_TOKEN,GITHUB_REPOSITORY
          script: |
            if [ ! -d ~/skillpulse ]; then
              git clone https://$PAT_TOKEN@github.com/$GITHUB_REPOSITORY.git ~/skillpulse
            else
              cd ~/skillpulse && git pull origin main
            fi

      - name: Create .env if not exists
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: MYSQL_ROOT_PASSWORD,DB_HOST,DB_USER,DB_PASSWORD,DB_NAME,DOCKERHUB_USERNAME
          script: |
            if [ ! -f ~/skillpulse/.env ]; then
              cat > ~/skillpulse/.env << EOF
            MYSQL_ROOT_PASSWORD=$MYSQL_ROOT_PASSWORD
            DB_HOST=$DB_HOST
            DB_USER=$DB_USER
            DB_PASSWORD=$DB_PASSWORD
            DB_NAME=$DB_NAME
            DOCKERHUB_USERNAME=$DOCKERHUB_USERNAME
            EOF
              echo ".env created from secrets"
            fi

      - name: Deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/skillpulse
            docker compose pull
            docker compose up -d
            docker image prune -f
